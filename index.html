<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sutra Fitness — All Versions</title>

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ff6b35, #f7c948);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.sub {
            color: #888;
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }
        .cards {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        a.card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 220px;
            height: 220px;
            background: #151515;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
        }
        a.card:hover {
            border-color: #ff6b35;
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(255, 107, 53, 0.15);
        }
        a.card .version {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #f7c948);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        a.card .label {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <h1>Sutra Fitness</h1>
    <p class="sub">Select a version to preview</p>
    <div class="cards">
        <a class="card" href="v1/">
            <span class="version">V1</span>
            <span class="label">Version 1</span>
        </a>
        <a class="card" href="v2/">
            <span class="version">V2</span>
            <span class="label">Version 2</span>
        </a>
        <a class="card" href="v3/">
            <span class="version">V3</span>
            <span class="label">Version 3</span>
        </a>
    </div>
</body>
</html>
